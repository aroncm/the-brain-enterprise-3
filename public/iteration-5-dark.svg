<svg viewBox="45 145 440 215" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Baseball brAIn logo — dark background</title>
  <desc>Full combination mark for dark/cobalt backgrounds. White text and diamond, cobalt accent on AI and crosshair.</desc>

  <!-- Wordmark -->
  <g id="wordmark">
    <text
      x="80"
      y="222"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="36"
      font-weight="300"
      letter-spacing="6"
      fill="#FFFFFF"
    >BASEBALL</text>

    <text
      x="77"
      y="308"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="84"
      font-weight="700"
      fill="#FFFFFF"
      letter-spacing="-1"
    >br<tspan fill="#4472F5">AI</tspan>n</text>
  </g>

  <!-- Tagline — cobalt stays legible on dark -->
  <g id="tagline">
    <text
      x="80"
      y="344"
      font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
      font-size="15"
      font-weight="400"
      letter-spacing="3.5"
      fill="#4472F5"
    >ADVANCED BASEBALL INTELLIGENCE</text>
  </g>

  <!-- Diamond: cx=370 cy=247 half=70 — same position as iteration-5 -->
  <g id="icon">
    <polygon
      points="370,177 440,247 370,317 300,247"
      fill="none"
      stroke="#FFFFFF"
      stroke-width="2.5"
      stroke-linejoin="miter"
    />

    <!-- Cobalt crosshair -->
    <line x1="362" y1="247" x2="378" y2="247" stroke="#4472F5" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="370" y1="239" x2="370" y2="255" stroke="#4472F5" stroke-width="1.5" stroke-linecap="round"/>
  </g>

</svg>
